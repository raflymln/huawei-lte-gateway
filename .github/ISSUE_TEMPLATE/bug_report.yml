---
name: Bug Report
description: Report a bug in the gateway service
labels: bug
body:
    - type: textarea
      id: description
      attributes:
          label: Description
          description: Describe the bug clearly
          placeholder: Bug description
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: Steps to reproduce the bug
          placeholder: |
              1.
              2.
              3.
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What should happen
          placeholder: Expected behavior
    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happens
          placeholder: Actual behavior
    - type: textarea
      id: environment
      attributes:
          label: Environment
          description: Describe your setup
          placeholder: |
              - Modem model:
              - Firmware version:
              - Deployment method:
              - OS:
    - type: textarea
      id: logs
      attributes:
          label: Logs
          description: Paste relevant logs
    - type: textarea
      id: context
      attributes:
          label: Additional Context
          description: Any other context
