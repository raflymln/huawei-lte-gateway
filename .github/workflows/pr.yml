name: PR Checks

on:
    pull_request:
        branches: [main]

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v1
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - run: bun run typecheck
            - run: bun run lint
            - run: bun run test
