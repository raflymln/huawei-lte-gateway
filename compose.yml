services:
    gateway:
        build:
            context: .
            dockerfile: Dockerfile
            platforms:
                - linux/arm64/v8
                - linux/amd64
        container_name: huawei-lte-gateway
        restart: unless-stopped
        environment:
            - PORT=${PORT:-3000}
            - MODEM_URL=${MODEM_URL:-http://192.168.8.1/api}
        ports:
            - "${PORT:-3000}:3000"
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 10s
